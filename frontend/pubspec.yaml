name: smart_bike_rental
description: Smart Bike Rental MVP — Flutter mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client for REST API calls
  http: ^1.2.1

  # Secure local storage for JWT token
  flutter_secure_storage: ^9.0.0

  # Date/time picker for booking screen
  intl: ^0.19.0

  # Image picker for license upload
  image_picker: ^1.0.7

  # Cached network images (bike photos from Cloudinary)
  cached_network_image: ^3.3.1

  # Material icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
